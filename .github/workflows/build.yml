name: Build

on:
  push:
    branches: ["**"]
    paths:
      - "main/**"
      - "sdkconfig.defaults*"
      - "partitions-*.csv"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "main/**"
      - "sdkconfig.defaults*"
      - "partitions-*.csv"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: Build (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only boards we actually have hardware to test against. The
          # other three (xiao_s3_sense, ai_thinker, esp32_s3_eye) have
          # unverified pin mappings - compiling them would only prove the
          # code parses, not that the pins are right, and nobody catches a
          # wrong pin until real hardware shows up. Add them back here once
          # someone tests on that board.
          - board: freenove_s3
            target: esp32s3
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.esp32s3"
            kconfig: "CONFIG_BOARD_FREENOVE_S3=y"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select board
        run: echo "${{ matrix.kconfig }}" >> sdkconfig.defaults

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.4
          target: ${{ matrix.target }}
          sdkconfig_defaults: ${{ matrix.sdkconfig_defaults }}
