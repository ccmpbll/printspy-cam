name: Build

on:
  push:
    branches: ["**"]
    paths:
      - "main/**"
      - "sdkconfig.defaults*"
      - "board-configs/**"
      - "partitions-*.csv"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "main/**"
      - "sdkconfig.defaults*"
      - "board-configs/**"
      - "partitions-*.csv"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: Build (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only boards we actually have hardware to test against. The
          # other two (xiao_s3_sense, esp32_s3_eye) have unverified pin
          # mappings - compiling them would only prove the code parses,
          # not that the pins are right, and nobody catches a wrong pin
          # until real hardware shows up. Add them here once someone
          # tests on that board (a board-configs/<board>.sdkconfig needs
          # to exist for it first).
          - board: freenove_s3
            target: esp32s3
          - board: nulllab_esp32s3_cam
            target: esp32s3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.4
          target: ${{ matrix.target }}
          command: idf.py -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32s3;board-configs/${{ matrix.board }}.sdkconfig" build
