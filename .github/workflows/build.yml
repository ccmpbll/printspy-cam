name: Build

on:
  push:
    branches: ["**"]
    paths:
      - "main/**"
      - "sdkconfig.defaults*"
      - "board-configs/**"
      - "partitions-*.csv"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "main/**"
      - "sdkconfig.defaults*"
      - "board-configs/**"
      - "partitions-*.csv"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"

jobs:
  build:
    name: Build (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Boards we have hardware to test against - see board-configs/
          # for the full set and main/boards/ to add a new one.
          - board: freenove_s3
            target: esp32s3
          - board: nulllab_esp32s3_cam
            target: esp32s3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.4
          target: ${{ matrix.target }}
          command: idf.py -D SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32s3;board-configs/${{ matrix.board }}.sdkconfig" build
