name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: freenove_s3
            target: esp32s3
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.esp32s3"
            kconfig: "CONFIG_BOARD_FREENOVE_S3=y"
          - board: xiao_s3_sense
            target: esp32s3
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.esp32s3"
            kconfig: "CONFIG_BOARD_XIAO_S3_SENSE=y"
          - board: ai_thinker
            target: esp32
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.esp32"
            kconfig: "CONFIG_BOARD_AI_THINKER=y"
          - board: esp32_s3_eye
            target: esp32s3
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfig.defaults.esp32s3"
            kconfig: "CONFIG_BOARD_ESP32_S3_EYE=y"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Inject version into firmware
        run: |
          sed -i 's/#define PRINTSPY_CAM_VERSION ".*"/#define PRINTSPY_CAM_VERSION "${{ steps.version.outputs.VERSION }}"/' \
            main/version.h

      - name: Select board
        run: echo "${{ matrix.kconfig }}" >> sdkconfig.defaults

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.4
          target: ${{ matrix.target }}
          sdkconfig_defaults: ${{ matrix.sdkconfig_defaults }}

      - name: Prepare release binaries
        run: |
          pip install esptool
          V=${{ steps.version.outputs.VERSION }}
          B=${{ matrix.board }}
          # Full-flash image for first-time flashing over USB at offset 0x0
          esptool.py --chip ${{ matrix.target }} merge_bin \
            --output ${{ runner.temp }}/printspy-cam-$B-full-$V.bin \
            0x0 build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/printspy-cam.bin
          # App-only image for OTA updates via the web admin
          cp build/printspy-cam.bin ${{ runner.temp }}/printspy-cam-$B-app-$V.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            **`printspy-cam-<board>-full-${{ steps.version.outputs.VERSION }}.bin`** — full-flash image. Flash over USB at offset `0x0` (esptool / web flasher) for a first-time install.

            **`printspy-cam-<board>-app-${{ steps.version.outputs.VERSION }}.bin`** — app-only image. Upload via the web admin (`http://printspy-cam.local`) to update an already-running device over the air.
          files: |
            ${{ runner.temp }}/printspy-cam-${{ matrix.board }}-full-${{ steps.version.outputs.VERSION }}.bin
            ${{ runner.temp }}/printspy-cam-${{ matrix.board }}-app-${{ steps.version.outputs.VERSION }}.bin
