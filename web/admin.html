<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>PrintSpy Cam</title>
<style>
:root{
--bg-primary:#1a1a1a;--bg-secondary:#252525;--bg-tertiary:#333333;
--text-primary:#e8e8e8;--text-secondary:#aaaaaa;--text-tertiary:#777777;
--border:#333333;--accent:#60a5fa;--success:#4ade80;--warning:#facc15;--error:#f87171;
--radius:8px;--radius-lg:12px;
}
body{margin:0;padding:24px 16px;background:var(--bg-secondary);
color:var(--text-primary);font-family:-apple-system,BlinkMacSystemFont,
'Segoe UI',Roboto,Helvetica,Arial,sans-serif;max-width:480px;margin:0 auto;}
h1{font-size:1.4rem;font-weight:700;margin:0 0 4px;}
p.sub{margin:0 0 20px;color:var(--text-tertiary);font-size:.85rem;}
.card{background:var(--bg-primary);border:1px solid var(--border);
border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;}
.card h2{font-size:1rem;font-weight:600;margin:0 0 12px;}
img#preview{width:100%;border-radius:var(--radius);display:block;background:#000;}
label{display:block;font-size:.85rem;font-weight:600;margin-bottom:4px;
color:var(--text-secondary);}
select,input[type=text],input[type=password]{width:100%;box-sizing:border-box;
padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);
font-size:.95rem;background:var(--bg-secondary);color:var(--text-primary);
margin-bottom:12px;}
input[type=range]{width:100%;margin-bottom:12px;}
.row{display:flex;align-items:center;justify-content:space-between;
margin-bottom:12px;font-size:.9rem;}
button{padding:.4rem .8rem;border:1px solid var(--accent);border-radius:var(--radius);
background:var(--accent);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;}
button:hover{opacity:.9;}
button:active{opacity:.75;}
.status-line{font-size:.8rem;color:var(--text-tertiary);margin:2px 0;}
#logs{background:#000;color:var(--text-primary);font-family:ui-monospace,Menlo,monospace;
font-size:.75rem;height:200px;overflow-y:auto;-webkit-overflow-scrolling:touch;
overscroll-behavior:contain;touch-action:pan-y;padding:8px;border-radius:var(--radius);
white-space:pre-wrap;word-break:break-all;border:1px solid var(--border);}
#msg{font-size:.85rem;margin-top:8px;display:none;color:var(--text-secondary);}
</style>
</head>
<body>
<h1>PrintSpy Cam</h1>
<p class="sub" id="status-sub">-</p>

<div class="card">
  <h2>Preview</h2>
  <img id="preview" src="/snapshot" alt="live snapshot">
  <button id="stream-toggle" style="margin-top:8px;">Live view</button>
</div>

<div class="card">
  <h2>Camera</h2>
  <label for="resolution">Resolution</label>
  <select id="resolution">
    <option value="8">VGA (640x480, fastest stream)</option>
    <option value="9">SVGA (800x600)</option>
    <option value="10">XGA (1024x768)</option>
    <option value="11">HD (1280x720, default)</option>
    <option value="12">SXGA (1280x1024)</option>
    <option value="13">UXGA (1600x1200, slowest stream)</option>
  </select>
  <label for="quality">JPEG quality (<span id="quality-val">12</span>, lower = better/slower)</label>
  <input type="range" id="quality" min="4" max="40" step="1">
  <div class="row"><span>Flip horizontally</span><input type="checkbox" id="hmirror"></div>
  <div class="row"><span>Flip vertically</span><input type="checkbox" id="vflip"></div>
  <label for="brightness">Brightness (<span id="brightness-val">0</span>)</label>
  <input type="range" id="brightness" min="-2" max="2" step="1">
  <label for="contrast">Contrast (<span id="contrast-val">0</span>)</label>
  <input type="range" id="contrast" min="-2" max="2" step="1">
  <label for="saturation">Saturation (<span id="saturation-val">0</span>)</label>
  <input type="range" id="saturation" min="-2" max="2" step="1">
  <button id="save-camera">Save</button>
</div>

<div class="card">
  <h2>WiFi</h2>
  <label for="ssid">Network</label>
  <input type="text" id="ssid" autocomplete="off">
  <label for="password">Password</label>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <input type="password" id="password" autocomplete="new-password" style="margin-bottom:0;">
    <button type="button" id="toggle-password" style="flex-shrink:0;">Show</button>
  </div>
  <button id="save-wifi">Save &amp; restart</button>
</div>

<div class="card">
  <h2>Firmware</h2>
  <p class="status-line" id="version-line">-</p>
  <input type="file" id="ota-file" accept=".bin">
  <button id="upload-ota">Upload &amp; restart</button>
</div>

<div class="card">
  <h2>Log console</h2>
  <div id="logs"></div>
</div>

<p id="msg"></p>

<script>
function showMsg(text) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.display = 'block';
}

function refreshStatus() {
  fetch('/api/status').then(r => r.json()).then(s => {
    document.getElementById('status-sub').textContent =
      `${s.ip || '?'} - ${s.wifi_ssid || '?'} - up ${Math.floor(s.uptime_seconds / 60)}m`;
    document.getElementById('version-line').textContent = `Version ${s.version}`;
  }).catch(() => {});
}

function refreshCameraSettings() {
  fetch('/api/settings').then(r => r.json()).then(s => {
    document.getElementById('hmirror').checked = s.hmirror;
    document.getElementById('vflip').checked = s.vflip;
    document.getElementById('brightness').value = s.brightness;
    document.getElementById('brightness-val').textContent = s.brightness;
    document.getElementById('contrast').value = s.contrast;
    document.getElementById('contrast-val').textContent = s.contrast;
    document.getElementById('saturation').value = s.saturation;
    document.getElementById('saturation-val').textContent = s.saturation;
    document.getElementById('resolution').value = s.resolution;
    document.getElementById('quality').value = s.quality;
    document.getElementById('quality-val').textContent = s.quality;
  }).catch(() => {});
}

['brightness', 'contrast', 'saturation', 'quality'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    document.getElementById(id + '-val').textContent = e.target.value;
  });
});

document.getElementById('save-camera').addEventListener('click', () => {
  const body = {
    hmirror: document.getElementById('hmirror').checked,
    vflip: document.getElementById('vflip').checked,
    brightness: parseInt(document.getElementById('brightness').value, 10),
    contrast: parseInt(document.getElementById('contrast').value, 10),
    saturation: parseInt(document.getElementById('saturation').value, 10),
    resolution: parseInt(document.getElementById('resolution').value, 10),
    quality: parseInt(document.getElementById('quality').value, 10),
  };
  fetch('/api/settings', {method: 'POST', body: JSON.stringify(body)})
    .then(() => showMsg('Camera settings saved.'))
    .catch(() => showMsg('Failed to save camera settings.'));
});

document.getElementById('save-wifi').addEventListener('click', () => {
  const ssid = document.getElementById('ssid').value;
  if (!ssid) { showMsg('SSID is required.'); return; }
  const body = {ssid, password: document.getElementById('password').value};
  showMsg('Saving and restarting...');
  fetch('/api/wifi', {method: 'POST', body: JSON.stringify(body)}).catch(() => {});
});

document.getElementById('toggle-password').addEventListener('click', e => {
  const input = document.getElementById('password');
  const showing = input.type === 'text';
  input.type = showing ? 'password' : 'text';
  e.target.textContent = showing ? 'Show' : 'Hide';
});

let streaming = false;
const previewImg = document.getElementById('preview');
document.getElementById('stream-toggle').addEventListener('click', e => {
  streaming = !streaming;
  e.target.textContent = streaming ? 'Stop live view' : 'Live view';
  previewImg.src = streaming ? '/stream' : ('/snapshot?t=' + Date.now());
});

let otaInProgress = false;
document.getElementById('upload-ota').addEventListener('click', () => {
  const fileInput = document.getElementById('ota-file');
  const file = fileInput.files[0];
  if (!file) { showMsg('Choose a .bin file first.'); return; }
  showMsg('Uploading firmware...');
  // /snapshot and /api/status are synchronous handlers on the same single
  // httpd task as /api/ota - polling them during the upload starves the
  // OTA transfer (recv timeouts) instead of running alongside it.
  otaInProgress = true;
  fetch('/api/ota', {method: 'POST', body: file})
    .then(r => {
      if (!r.ok) throw new Error();
      showMsg('Upload complete, restarting...');
    })
    .catch(() => {
      otaInProgress = false;
      showMsg('Firmware upload failed.');
    });
});

const logsEl = document.getElementById('logs');
const LOG_MAX_LINES = 500;
let logLines = [];
const logSource = new EventSource('/api/logs');
logSource.onmessage = e => {
  logLines.push(e.data);
  if (logLines.length > LOG_MAX_LINES) {
    logLines = logLines.slice(-LOG_MAX_LINES);
  }
  logsEl.textContent = logLines.join('\n') + '\n';
  logsEl.scrollTop = logsEl.scrollHeight;
};

refreshStatus();
refreshCameraSettings();
setInterval(() => {
  if (!otaInProgress) {
    refreshStatus();
  }
}, 5000);
setInterval(() => {
  if (!streaming && !otaInProgress) {
    previewImg.src = '/snapshot?t=' + Date.now();
  }
}, 3000);
</script>
</body>
</html>
